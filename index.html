<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Firstie</title>
</head>
<body>
    <main>
        <h1>Firstie</h1>
        
        <div class="user-input">
        <label>Who goes first?</label>
        <div class="input-line">
        <input id="newPlayer" type="text" placeholder="Write name...">
        <button id="btnAdd">+</button>
        </div>
        <div class="playerBox">
        <ul id="playerList"></ul>
        </div>
        </div>

        <div class="random">
        <button id="btnRandom">Pick a name</button>

        <p id="winner"></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
